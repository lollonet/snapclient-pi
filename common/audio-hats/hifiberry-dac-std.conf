# HiFiBerry DAC+ Standard/Clone Configuration
# Forces Pi as I2S clock master (hifiberry-dacplus-std overlay).
# Use for EEPROM-less boards where auto-detect (hifiberry-dacplus) falsely
# identifies the DAC as Pro, causing a master clock race with no audio output.
HAT_NAME="HiFiBerry DAC+ (Standard/clone)"
HAT_OVERLAY="hifiberry-dacplus-std"
HAT_CARD_NAME="sndrpihifiberry"
HAT_TYPE="analog"
HAT_FORMAT="S32_LE"
HAT_RATE="48000"
HAT_MIXER="hardware:Digital"
