# Internal Audio (bcm2835) Configuration
# Pi's built-in 3.5mm headphone jack and HDMI audio output
# Low quality — use a DAC HAT or USB audio for better sound
HAT_NAME="Internal Audio (bcm2835)"
HAT_OVERLAY=""
HAT_CARD_NAME="Headphones"
HAT_TYPE="analog"
HAT_FORMAT="S16_LE"
HAT_RATE="48000"
HAT_MIXER="software"
