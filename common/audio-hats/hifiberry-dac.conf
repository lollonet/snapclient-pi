# HiFiBerry DAC+ Configuration
# Use -std overlay to force Pi as clock master (safe for Standard and Pro)
# The auto-detect overlay incorrectly identifies Standard as Pro when EEPROM is absent
HAT_NAME="HiFiBerry DAC+"
HAT_OVERLAY="hifiberry-dacplus-std"
HAT_CARD_NAME="sndrpihifiberry"
HAT_TYPE="analog"
HAT_FORMAT="S32_LE"
HAT_RATE="48000"
HAT_MIXER="hardware:Digital"
