name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install shellcheck
        run: |
          if ! command -v shellcheck &>/dev/null; then
            SC_VERSION="v0.10.0"
            curl -Lso /tmp/sc.tar.xz \
              "https://github.com/koalaman/shellcheck/releases/download/${SC_VERSION}/shellcheck-${SC_VERSION}.linux.x86_64.tar.xz"
            tar -xf /tmp/sc.tar.xz -C /tmp
            sudo install /tmp/shellcheck-${SC_VERSION}/shellcheck /usr/local/bin/
            rm -rf /tmp/sc.tar.xz /tmp/shellcheck-${SC_VERSION}
          fi
          shellcheck --version

      - name: Shellcheck
        run: |
          find common/scripts common/docker tests scripts -name '*.sh' -type f 2>/dev/null \
            | xargs -r shellcheck --severity=warning

      - name: Install hadolint
        run: |
          if ! command -v hadolint &>/dev/null; then
            HL_VERSION="v2.12.0"
            curl -Lso /tmp/hadolint \
              "https://github.com/hadolint/hadolint/releases/download/${HL_VERSION}/hadolint-Linux-x86_64"
            sudo install /tmp/hadolint /usr/local/bin/
            rm -f /tmp/hadolint
          fi
          hadolint --version

      - name: Hadolint Dockerfiles
        run: |
          hadolint --config .hadolint.yaml --failure-threshold warning common/docker/snapclient/Dockerfile
          hadolint --config .hadolint.yaml --failure-threshold warning common/docker/fb-display/Dockerfile
          hadolint --config .hadolint.yaml --failure-threshold warning common/docker/audio-visualizer/Dockerfile


  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.6.0
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: pip install pytest==8.3.4 numpy==2.4.3 Pillow==11.1.0 requests==2.32.3 websockets==14.1

      - name: Run Python tests
        run: pytest tests/ -v --tb=short

      - name: Bash syntax check (setup.sh)
        run: bash -n common/scripts/setup.sh

      - name: Test HAT configurations
        run: bash tests/test_hat_configs.sh

      - name: Test entrypoint validation
        run: bash tests/test_entrypoint.sh

      - name: Test resource profile detection
        run: bash tests/test_resource_profiles.sh

      - name: Validate HAT config count
        run: |
          count=$(ls -1 common/audio-hats/*.conf | wc -l)
          if [ "$count" -ne 16 ]; then
            echo "Expected 16 HAT configs, found $count"
            exit 1
          fi
          echo "All 16 HAT configs present"
