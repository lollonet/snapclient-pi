        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 # v0.35.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
